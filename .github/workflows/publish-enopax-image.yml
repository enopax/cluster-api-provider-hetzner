name: Publish Enopax CAPH Image
# yamllint disable rule:line-length
#
# Enopax fork-specific image publish workflow.
#
# Background
# ----------
# This fork carries a small "diagnostics-flags" patch on top of upstream CAPH
# (see issue #2). The resulting manager image used to be built and pushed by
# hand; this workflow wires that into CI.
#
# As part of adopting the org-wide package naming schema (enopax/enopax PR #15),
# the image is published to BOTH paths during the transition:
#   - ghcr.io/enopax/caph         (legacy path, kept working during cutover)
#   - ghcr.io/enopax/images/caph  (new namespaced path)
#
# It is trigger-on-demand only (workflow_dispatch). actions/checkout checks out
# the ref the workflow is dispatched on, so dispatching on the release branch
# (release/v1.1.6-diagnostics) builds that branch's code.
#
# The v1.1.6 manager Dockerfile (images/caph/Dockerfile) is self-contained: it
# compiles the binary in an official golang builder stage using BuildKit's
# TARGETOS/TARGETARCH, so there is no separate "builder image" to pre-build and
# no `builder_image`/`ARCH` build-arg to pass (those belonged to the older
# v1.0.x Dockerfile layout). Hetzner nodes are amd64, so linux/amd64 suffices.
#
# NOTE: upstream's existing `build.yml` / `release.yml` push to ghcr.io/syself
# and are unrelated to the enopax image; they are left untouched.
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.1.6-diagnostics)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  # Both target repositories. The legacy path is retained until the cutover to
  # the images/ namespace is complete across all consumers.
  LEGACY_IMAGE: ghcr.io/enopax/caph
  NAMESPACED_IMAGE: ghcr.io/enopax/images/caph

jobs:
  publish:
    name: Build and push enopax CAPH image (both paths)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The v1.1.6 manager Dockerfile is self-contained (golang builder stage),
      # so we build it directly. Build once and push to both repositories.
      - name: Build and push manager image to both paths
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/caph/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.LEGACY_IMAGE }}:${{ inputs.tag }}
            ${{ env.NAMESPACED_IMAGE }}:${{ inputs.tag }}

      - name: Summary
        run: |
          echo "Published:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${LEGACY_IMAGE}:${{ inputs.tag }} (legacy, kept during transition)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${NAMESPACED_IMAGE}:${{ inputs.tag }} (new images/ namespace)" >> "$GITHUB_STEP_SUMMARY"
